.theme-toggle{

let quests=[];
let states=[false,false,false,false,false,false];

function pickRandom(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function getRandomQuests(){

return[
{text:pickRandom(allQuests.easy),difficulty:"easy"},
{text:pickRandom(allQuests.easy),difficulty:"easy"},
{text:pickRandom(allQuests.easy),difficulty:"easy"},
{text:pickRandom(allQuests.medium),difficulty:"medium"},
{text:pickRandom(allQuests.medium),difficulty:"medium"},
{text:pickRandom(allQuests.hard),difficulty:"hard"}
];

}

function save(){

localStorage.setItem(STORAGE,JSON.stringify({
quests,
states,
theme:document.body.classList.contains("dark-mode"),
date:new Date().toDateString()
}));

}

function load(){

let data=localStorage.getItem(STORAGE);
if(!data)return false;

data=JSON.parse(data);

if(data.date!==new Date().toDateString())return false;

quests=data.quests;
states=data.states;

if(data.theme){
document.body.classList.add("dark-mode");
document.documentElement.style.backgroundColor='#242921';
}

return true;

}

function render(){

const list=document.getElementById("questList");
const title=document.getElementById("title");

const done=states.filter(v=>v).length;

if(done===6){
title.textContent="all finished!";
}else{
title.textContent="sidequests";
}

list.innerHTML="";

quests.forEach((q,i)=>{

const item=document.createElement("div");
item.className="quest-item";

const box=document.createElement("input");
box.type="checkbox";
box.checked=states[i];
box.onchange=()=>toggle(i);

const content=document.createElement("div");
content.className="quest-content";

const text=document.createElement("span");
text.className="quest-text"+(states[i]?" completed":"");
text.textContent=q.text;

const badge=document.createElement("span");
badge.className="difficulty-badge difficulty-"+q.difficulty;
badge.textContent=q.difficulty;

content.appendChild(text);
content.appendChild(badge);
item.appendChild(box);
item.appendChild(content);

list.appendChild(item);

});

}

function toggle(i){

states[i]=!states[i];

save();
render();

if(states.every(v=>v))celebrate();

}

function shuffleQuests(){

quests=getRandomQuests();
states=[false,false,false,false,false,false];

save();
render();

}

function toggleTheme(){

document.body.classList.toggle("dark-mode");
document.documentElement.style.backgroundColor = 
document.body.classList.contains('dark-mode') ? '#242921' : '#c7c7c3';
save();

}

function celebrate(){

const msg=document.createElement("div");

msg.innerText="quest complete ✧";

msg.style.cssText=`
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#242921;
color:#c7c7c3;
padding:10px 20px;
border-radius:6px;
font-family:'Hina Mincho',serif;
z-index:1000;
`;

if(document.body.classList.contains('dark-mode')){
msg.style.background='#c7c7c3';
msg.style.color='#242921';
}

document.body.appendChild(msg);

setTimeout(()=>msg.remove(),2000);

}

function init(){

if(!load()){
quests=getRandomQuests();
}

render();

}

init();
